<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Jogo do Número Secreto</title>
</head>
<body>
    <main>
        <section class="leaderboard-container">
    <h3 class="leaderboard-titulo">🏆 Top 10 Mestres</h3>
    <table>
        <thead>
            <tr>
                <th>Pos</th>
                <th>Nome</th>
                <th>Tentativas</th>
            </tr>
        </thead>
        <tbody id="lista-leaderboard">
            <tr>
                <td colspan="3">Carregando mentes brilhantes...</td>
            </tr>
        </tbody>
    </table>
</section>
        <div class="container">
            <h1 class="titulo">Mentalize um número...</h1>
            <h2 id="texto">Agora escolha um número entre 1 a 100</h2>
            
            <div class="container-adv">
            <input type="number" id="digite" placeholder="Digite seu chute" min="1" max="100">
            <p style="color:#fff; min-height: 24px;"></p>
        
            <div class="buttons">
                <button class="btn" id="chute-btn">Chutar</button>
                <button class="btn" id="reinicio-btn">Reiniciar</button>
            </div>
            
        </div>
        
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/banco.js"></script> 

    <script src="js/app.js"></script>
</body>
</html>
